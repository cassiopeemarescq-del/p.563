name: Compilation Windows Finale
on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Compiler le code C en EXE
        run: |
          gcc back_noise.c beeprob.c dsp.c Enhance.c EvalQual.c hosm.c inter_detect.c lpc.c LpcAnalysis.c main.c mapping.c module1.c module2.c module3.c n_dist.c p563.c perceptive.c pre_proc.c pt_filt.c signals.c statistics.c vtp.c -o p563.exe -lm -Wno-implicit-int

      - name: Sauvegarder l'exécutable
        uses: actions/upload-artifact@v4
        with:
          name: mon_executable_p563
          path: p563.exe
